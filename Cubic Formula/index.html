<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Cubic Solver</title>
  </head>

  <body>
      <div class="numbers">
        <h1>Cubic Solver</h1>
        <form id="cube-form">
          <label for="a-value">a:</label> 
          <input type ="number" id="a-value" name="a-value" required />
          <label for="b-value">b:</label> 
          <input type ="number" id="b-value" name="b-value" required />
          <label for="c-value">c:</label> 
          <input type ="number" id="c-value" name="c-value" required />
          <label for="d-value">d:</label> 
          <input type ="number" id="d-value" name="d-value" required />
          <label for="results"></label>
          <label for="button">Answer:</label>

          <input type="submit" value="Calculate" />
        </form>

      <script type="module" src="src/main.ts"></script>
    </div>
  </body>
</html>
